peptide_query:
  instruction: |
      Examine this figure from an immunology paper, and identify any peptide linear sequences shown using standard one-letter amino acid codes (e.g., R, G, D, A, etc.). The sequences are presented as combinations of these amino acid codes, often appearing like 'GRDSPLLY'. The sequence may be a part of a label, caption, 
      annotation or embedded within a molecular diagram. Respond only with a list of all identified sequences (e.g., ['GRDARDGA', 'YSLDYLLL']), otherwise if no linear sequence found, just generate 'None'.
hla_query:
  instruction: |
      Examine this figure from an immunology paper, and identify any MHC (Major Histocompatibility Complex) molecule names. This could be MHC class I or MHC class II,
      or it could be a group like HLA-A, HLA-A2, HLA-B7, or HLA-DR4 (humans) or "H-2ᵇ" or  H-2ᵏ with the superscript in mice. Or, it could be the gene or allele, which might look like : HLA-DRB3*02:87,
      H2-IEg7 in mice, Paan-A*28:01, Mafa-B*019:03:01:01. Sometimes HLA- or H2 is missing, or old notations are used like HLA-A2.1.
      Respond only with a list of all identified MHC molecules (e.g., ['HLA-A2', 'HLA-B40*01']), otherwise if no MHC molecule name found, just generate 'None'.
object_type:
  instruction: |
      Assign the peptide’s object type based on what the authors say. If the peptide is a sequence that exists in a natural protein, assign 'Peptide from protein'.  
      if the peptide comes from an engineered protein or is a mutated version of a natural peptide (e.g. such as in the case of neoepitopes in the context of cancer), return 'Peptide, no natural source'. 
      You must return only 'Peptide from protein' or 'Peptide, no natural source', exactly. Do not provide your reasoning.
      Peptide from protein - Peptide exists in a natural protein.
      Peptide, no natural source - Synthetic or mutated form of another peptide. Common cues: mutant, WT.
      '''Allowed values'''
      Peptide from protein
      Peptide, no natural source
      '''Example output'''
      "Peptide from protein"
  allowed_values:
    - Peptide from protein
    - Peptide, no natural source
  instruction_updated: |
